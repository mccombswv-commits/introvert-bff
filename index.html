<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introvert BFF — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #080808;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px,8vw,60px); letter-spacing: 4px; color: #fff; text-align: center; text-shadow: 0 0 60px rgba(155,89,182,0.5); margin-bottom: 6px; }
  .tagline { font-family: 'Playfair Display', serif; font-style: italic; color: #9b59b6; font-size: 16px; text-align: center; margin-bottom: 40px; }
  .card { background: #161616; border: 1px solid #2a2a2a; border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 380px; }
  .tabs { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; background: transparent; border: none; color: #666; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .tab.active { background: #9b59b6; color: #fff; }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 10px; padding: 13px 14px; color: #f0f0f0; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .form-input:focus { border-color: #9b59b6; box-shadow: 0 0 0 3px rgba(155,89,182,0.15); }
  .btn { width: 100%; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; background: #9b59b6; color: #fff; margin-top: 4px; transition: all 0.2s; letter-spacing: 0.02em; }
  .btn:hover { background: #8e44ad; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .error { background: rgba(204,34,0,0.12); border: 1px solid rgba(204,34,0,0.4); border-radius: 8px; padding: 11px 14px; font-size: 13px; color: #ff6b4a; margin-bottom: 16px; display: none; }
  .error.show { display: block; }
  .success { background: rgba(58,148,85,0.12); border: 1px solid rgba(58,148,85,0.4); border-radius: 8px; padding: 11px 14px; font-size: 13px; color: #5dbd7a; margin-bottom: 16px; display: none; }
  .success.show { display: block; }
  .footer-note { margin-top: 24px; font-size: 12px; color: #444; text-align: center; line-height: 1.6; }
  .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="logo">INTROVERT BFF</div>
<div class="tagline">Your personal social survival guide</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="showTab('signin')">Sign In</button>
    <button class="tab" onclick="showTab('signup')">Sign Up</button>
  </div>

  <div id="error-msg" class="error"></div>
  <div id="success-msg" class="success"></div>

  <!-- SIGN IN -->
  <div id="tab-signin">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="signin-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="signin-btn" onclick="signIn()">Sign In</button>
  </div>

  <!-- SIGN UP -->
  <div id="tab-signup" style="display:none">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="signup-password" placeholder="8+ characters" autocomplete="new-password">
    </div>
    <button class="btn" id="signup-btn" onclick="signUp()">Create Account</button>
  </div>
</div>

<div class="footer-note">
  By signing up, you agree to our<br>
  <a href="/app.html#legal" style="color:#9b59b6">Terms &amp; Privacy Policy</a>
</div>

<script>
  // ── SUPABASE INIT ──────────────────────────────────────────────
  // These values come from your Supabase project settings
  const SUPABASE_URL = 'https://uqrbkdtajkdhzpfmcbtc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxcmJrZHRhamtkaHpwZm1jYnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NDQ0ODcsImV4cCI6MjA5NDAyMDQ4N30.nBNRHed_WdEWX-vouAWM6QeoElX3NlVBMrJc7rhaIBs';
  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── CHECK IF ALREADY LOGGED IN ─────────────────────────────────
  (async () => {
    const { data: { session } } = await _sb.auth.getSession();
    if (session) window.location.href = '/app.html';
  })();

  // ── TAB SWITCHING ─────────────────────────────────────────────
  function showTab(tab) {
    document.getElementById('tab-signin').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('tab-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'signin')));
    clearMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  }

  function clearMessages() {
    document.getElementById('error-msg').classList.remove('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="loading"></span>Just a sec...' : btn.dataset.label;
  }

  // Store original labels
  document.getElementById('signin-btn').dataset.label = 'Sign In';
  document.getElementById('signup-btn').dataset.label = 'Create Account';

  // ── SIGN IN ───────────────────────────────────────────────────
  async function signIn() {
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    if (!email || !password) { showError('Please fill in both fields.'); return; }
    setLoading('signin-btn', true);
    const { error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) { showError(error.message); setLoading('signin-btn', false); return; }
    window.location.href = '/app.html';
  }

  // ── SIGN UP ───────────────────────────────────────────────────
  async function signUp() {
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!email || !password) { showError('Please fill in both fields.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    setLoading('signup-btn', true);
    const { error } = await _sb.auth.signUp({ email, password });
    if (error) { showError(error.message); setLoading('signup-btn', false); return; }
    showSuccess('Account created! Check your email to confirm, then sign in.');
    setLoading('signup-btn', false);
  }

  // ── ENTER KEY SUPPORT ─────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const activeTab = document.getElementById('tab-signin').style.display !== 'none' ? 'signin' : 'signup';
      activeTab === 'signin' ? signIn() : signUp();
    }
  });
</script>
</body>
</html>
